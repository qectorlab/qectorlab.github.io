<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>QECTOR</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect — encodes the requested path into a query
      // param and sends the browser to index.html, which decodes it back
      // via the matching script in index.html before React mounts.
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1).join("/") + "/?p=/" +
        l.pathname.slice(1).replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
